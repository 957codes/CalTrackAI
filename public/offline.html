<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CalTrack AI — Offline</title>
  <meta name="theme-color" content="#4ade80" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f23;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; color: #4ade80; margin-bottom: 12px; }
    p { font-size: 16px; color: #94a3b8; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #4ade80;
      color: #0f0f23;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4F4;</div>
    <h1>You're Offline</h1>
    <p>CalTrack AI needs an internet connection to analyze meals. Your saved meal history will be available when you reconnect.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
